{% extends "base.html" %}
{% block title %}My Cart — Mixed Store{% endblock %}

{% block content %}
<h1 class="page-title">My Cart</h1>
<div id="cartItems"></div>
<h2 id="totalPrice">Total: ₹0</h2>
<button id="orderNowBtn" class="order-btn">Order Now</button>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/cart.js') }}"></script>
<script>
// Override the Order Now button to POST to Flask /api/order
document.getElementById("orderNowBtn").addEventListener("click", async function () {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    if (cart.length === 0) { alert("Cart is empty!"); return; }

    try {
        const res  = await fetch("/api/order", {
            method:  "POST",
            headers: { "Content-Type": "application/json" },
            body:    JSON.stringify({ items: cart }),
        });
        const data = await res.json();
        if (data.success) {
            alert(`Order #${data.order_id} Placed Successfully 🎉\nTotal: ₹${data.total}`);
            localStorage.setItem("cart", JSON.stringify([]));
            location.reload();
        } else {
            alert("Order failed: " + (data.error || "Unknown error"));
        }
    } catch {
        alert("Could not connect to server. Please try again.");
    }
});
</script>
{% endblock %}
